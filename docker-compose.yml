version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: lawcaseai-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - lawcaseai-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: lawcaseai-backend
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/lawcaseai
    depends_on:
      - mongodb
    networks:
      - lawcaseai-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: lawcaseai-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:5000/api
    depends_on:
      - backend
    networks:
      - lawcaseai-network

networks:
  lawcaseai-network:
    driver: bridge

volumes:
  mongodb_data:
